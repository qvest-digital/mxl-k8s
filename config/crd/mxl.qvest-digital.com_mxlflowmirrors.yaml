---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: mxlflowmirrors.mxl.qvest-digital.com
spec:
  group: mxl.qvest-digital.com
  names:
    kind: MxlFlowMirror
    listKind: MxlFlowMirrorList
    plural: mxlflowmirrors
    shortNames:
    - mxlfm
    singular: mxlflowmirror
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.flowID
      name: Flow
      type: string
    - jsonPath: .spec.sourceNode
      name: Source
      type: string
    - jsonPath: .spec.targetNode
      name: Target
      type: string
    - jsonPath: .spec.provider
      name: Provider
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          MxlFlowMirror represents the desired and observed state of one
          (flow, target node) mirror.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              MxlFlowMirrorSpec defines a desired mirror of a flow onto a
              specific node.
            properties:
              flowID:
                description: FlowID is the MXL flow being mirrored.
                pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
                type: string
              provider:
                default: auto
                description: |-
                  Provider selects the libmxl-fabrics provider used to move
                  grains. Defaults to auto.
                enum:
                - auto
                - tcp
                - verbs
                - efa
                - shm
                type: string
              requestor:
                description: |-
                  Requestor identifies the Pod whose intent triggered this
                  mirror. Set by the agent for fanotify-driven mirrors; unset for
                  MxlReceiver-driven ones.
                properties:
                  name:
                    description: Name is the Pod name.
                    type: string
                  namespace:
                    description: Namespace is the Pod namespace.
                    type: string
                  uid:
                    description: |-
                      UID is the Pod's UID, captured at the time the reference was
                      recorded. Empty when the producer cannot determine it.
                    type: string
                required:
                - name
                - namespace
                type: object
              sourceNode:
                description: SourceNode is the Kubernetes node hosting the origin
                  flow.
                type: string
              targetNode:
                description: |-
                  TargetNode is the Kubernetes node where the flow should be
                  materialized.
                type: string
            required:
            - flowID
            - sourceNode
            - targetNode
            type: object
          status:
            description: MxlFlowMirrorStatus reports the runtime state of a mirror.
            properties:
              conditions:
                description: Conditions describes the current state of the mirror.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the spec generation last reconciled.
                format: int64
                type: integer
              phase:
                description: Phase tracks the mirror lifecycle.
                enum:
                - Pending
                - Materializing
                - Ready
                - Failed
                type: string
              targetInfo:
                description: |-
                  TargetInfo is the libmxl-fabrics target descriptor produced by
                  mxlFabricsTargetSetup and serialized via
                  mxlFabricsTargetInfoToString. The initiator-side gateway parses
                  it with mxlFabricsTargetInfoFromString.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
