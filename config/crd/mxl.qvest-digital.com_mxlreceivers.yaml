---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: mxlreceivers.mxl.qvest-digital.com
spec:
  group: mxl.qvest-digital.com
  names:
    kind: MxlReceiver
    listKind: MxlReceiverList
    plural: mxlreceivers
    shortNames:
    - mxlr
    singular: mxlreceiver
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.flowID
      name: Flow
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          MxlReceiver expresses a consumer Pod's intent to read an MXL flow.
          The operator translates each MxlReceiver into one MxlFlowMirror per
          distinct target node.

          If another receiver already targets the same (flowID, target node),
          the existing MxlFlowMirror is reused and this receiver is appended
          to its metadata.ownerReferences as a non-controller owner. Deleting
          the receiver removes its owner ref from each mirror it shares; the
          mirror is torn down by the operator only when its last owner ref
          goes away. The owners on a mirror are visible via kubectl describe.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              MxlReceiverSpec declares that one or more Pods want a flow
              available locally on their node.
            properties:
              flowID:
                description: FlowID is the MXL flow the consumer wants to read.
                pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
                type: string
              podRef:
                description: |-
                  PodRef pins this receiver to a single Pod in this namespace.
                  Exactly one of podSelector / podRef must be set.
                properties:
                  name:
                    description: Name is the Pod name.
                    type: string
                  namespace:
                    description: Namespace is the Pod namespace.
                    type: string
                  uid:
                    description: |-
                      UID is the Pod's UID, captured at the time the reference was
                      recorded. Empty when the producer cannot determine it.
                    type: string
                required:
                - name
                - namespace
                type: object
              podSelector:
                description: |-
                  PodSelector matches the consumer Pods in this namespace whose
                  nodes should have the flow materialized. Exactly one of
                  podSelector / podRef must be set.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              provider:
                default: auto
                description: |-
                  Provider selects the libmxl-fabrics provider used to move
                  grains. Defaults to auto.
                enum:
                - auto
                - tcp
                - verbs
                - efa
                - shm
                type: string
            required:
            - flowID
            type: object
            x-kubernetes-validations:
            - message: exactly one of podSelector or podRef must be set
              rule: (has(self.podSelector)?1:0)+(has(self.podRef)?1:0)==1
          status:
            description: MxlReceiverStatus reports the runtime state of a receiver.
            properties:
              boundMirror:
                description: |-
                  BoundMirror references the MxlFlowMirror created to satisfy
                  this receiver.
                properties:
                  name:
                    description: Name is the MxlFlowMirror name.
                    type: string
                  namespace:
                    description: Namespace is the MxlFlowMirror namespace.
                    type: string
                required:
                - name
                - namespace
                type: object
              conditions:
                description: Conditions describes the current state of the receiver.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the spec generation last reconciled.
                format: int64
                type: integer
              phase:
                description: Phase tracks the receiver lifecycle.
                enum:
                - Pending
                - Bound
                - Failed
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
