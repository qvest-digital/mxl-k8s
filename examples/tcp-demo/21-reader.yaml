# Consumer pod for the demo. Opens the flow on its local MXL domain
# with the `read-grain` example binary from go-mxl, which prints a
# one-line summary of each grain it observes. The libmxl-intent.so
# LD_PRELOAD shim turns the initial ENOENT (the mirror hasn't
# materialized yet on this node) into a synchronous wait on the
# agent's UDS — so read-grain's first open already sees the
# mirrored flow.
#
# Anti-affinity forces the pod onto a different node than the
# writer so the mirror plumbing is actually exercised across the
# fabric.

apiVersion: v1
kind: Pod
metadata:
  name: mxl-tcp-demo-reader
  namespace: mxl-system
  labels:
    app.kubernetes.io/name: mxl-tcp-demo-reader
    mxl-k8s-demo.qvest-digital.com/role: consumer
spec:
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              mxl-k8s-demo.qvest-digital.com/role: producer
          topologyKey: kubernetes.io/hostname
  initContainers:
    - name: install-intent-shim
      image: local/mxl-intent-shim:dev
      imagePullPolicy: IfNotPresent
      volumeMounts:
        - name: intent-shim
          mountPath: /shared
  containers:
    - name: reader
      image: local/mxl-demo-tools:dev
      command: ["/usr/local/bin/read-grain"]
      args:
        - "-domain"
        - "/run/mxl/domain"
        - "-flow"
        - "5fbec3b1-1b0f-417d-9059-8b94a47197ed"
      env:
        - name: LD_PRELOAD
          value: /opt/mxl-intent/libmxl-intent.so
      securityContext:
        capabilities:
          add: ["IPC_LOCK", "SYS_RESOURCE"]
      volumeMounts:
        # Mount /run/mxl as a whole so both the domain subdir and the
        # agent's intent socket land inside the pod even if the
        # socket hasn't been created yet at scheduling time.
        - name: mxl-run
          mountPath: /run/mxl
        - name: intent-shim
          mountPath: /opt/mxl-intent
          readOnly: true
  volumes:
    - name: mxl-run
      hostPath:
        path: /run/mxl
        type: DirectoryOrCreate
    - name: intent-shim
      emptyDir: {}
