# Producer pod for the demo. Writes a synthetic deterministic
# pattern into a flow on the local MXL domain using the
# `write-grain` example binary from go-mxl. The labels pin it onto
# its node so the receiver below can target a different one via
# anti-affinity.

apiVersion: v1
kind: Pod
metadata:
  name: mxl-tcp-demo-writer
  namespace: mxl-system
  labels:
    app.kubernetes.io/name: mxl-tcp-demo-writer
    mxl-k8s-demo.qvest-digital.com/role: producer
spec:
  containers:
    - name: writer
      image: local/mxl-demo-tools:dev
      command: ["/usr/local/bin/write-grain"]
      args:
        - "-domain"
        - "/run/mxl/domain"
        - "-flow-def"
        - "/etc/mxl-demo/flow-video-v210.json"
      # IPC_LOCK + SYS_RESOURCE: libmxl pins flow pages into RAM via
      # mlock; tmpfs-backed shared memory needs the same to be
      # RDMA-pinnable from the gateway sharing this domain.
      securityContext:
        capabilities:
          add: ["IPC_LOCK", "SYS_RESOURCE"]
      volumeMounts:
        - name: mxl-domain
          mountPath: /run/mxl/domain
        - name: flow-config
          mountPath: /etc/mxl-demo
          readOnly: true
  volumes:
    - name: mxl-domain
      hostPath:
        path: /run/mxl/domain
        type: DirectoryOrCreate
    - name: flow-config
      configMap:
        name: mxl-demo-flow-config
