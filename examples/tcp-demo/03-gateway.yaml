apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: mxl-fabrics-gateway
  namespace: mxl-system
  labels:
    app.kubernetes.io/name: mxl-fabrics-gateway
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: mxl-fabrics-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mxl-fabrics-gateway
    spec:
      serviceAccountName: mxl-fabrics-gateway
      # hostNetwork so the libmxl-fabrics TCP endpoint listens on the
      # node's interface -- TargetInfo embeds host:port, which any peer
      # gateway can dial across the cluster.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: gateway
          image: local/mxl-fabrics-gateway:dev
          imagePullPolicy: IfNotPresent
          args:
            - --domain-path=/run/mxl/domain
            - --providers=tcp
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - name: probe
              containerPort: 8081
            - name: metrics
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: probe
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: probe
            initialDelaySeconds: 2
          volumeMounts:
            - name: mxl-domain
              mountPath: /run/mxl/domain
      volumes:
        - name: mxl-domain
          hostPath:
            path: /run/mxl/domain
            type: DirectoryOrCreate
