apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Demo workload overlay for the chart-driven KIND flow. The chart
# itself installs the operator/agent/gateway DaemonSets+Deployment;
# this overlay layers the writer/receiver/reader pods on top.
# Manifests are sourced verbatim from examples/tcp-demo/ -- no
# duplicated content lives here.

namespace: mxl-system

resources:
  - ../../tcp-demo/10-writer.yaml
  - ../../tcp-demo/20-receiver.yaml
  - ../../tcp-demo/21-reader.yaml
  - ../../tcp-demo/11-writer-audio.yaml
  - ../../tcp-demo/22-receiver-audio.yaml
  - ../../tcp-demo/23-reader-audio.yaml

configMapGenerator:
  - name: mxl-demo-flow-config
    files:
      - ../../tcp-demo/flow-video-v210.json
      - ../../tcp-demo/flow-audio-f32.json
generatorOptions:
  disableNameSuffixHash: true
