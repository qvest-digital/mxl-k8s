# Consumer pod for the RDMA demo. Uses the libmxl-intent.so shim
# so the first mxlCreateFlowReader synchronously waits on the
# agent rather than failing with FLOW_NOT_FOUND.

apiVersion: v1
kind: Pod
metadata:
  name: mxl-rdma-demo-reader
  namespace: mxl-system
  labels:
    app.kubernetes.io/name: mxl-rdma-demo-reader
    mxl-k8s-demo.qvest-digital.com/role: consumer
spec:
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              mxl-k8s-demo.qvest-digital.com/role: producer
          topologyKey: kubernetes.io/hostname
  initContainers:
    - name: install-intent-shim
      image: local/mxl-intent-shim:dev
      imagePullPolicy: IfNotPresent
      volumeMounts:
        - name: intent-shim
          mountPath: /shared
  containers:
    - name: reader
      image: ghcr.io/qvest-digital/go-mxl-runtime:1.0.0-rc.3
      command: ["/opt/libmxl/bin/mxl-info"]
      args:
        - "-d"
        - "/run/mxl/domain"
      env:
        - name: LD_PRELOAD
          value: /opt/mxl-intent/libmxl-intent.so
      securityContext:
        capabilities:
          add: ["IPC_LOCK", "SYS_RESOURCE"]
      volumeMounts:
        - name: mxl-domain
          mountPath: /run/mxl/domain
        - name: intent-shim
          mountPath: /opt/mxl-intent
          readOnly: true
        - name: agent-sock
          mountPath: /run/mxl/agent.sock
  volumes:
    - name: mxl-domain
      hostPath:
        path: /run/mxl/domain
        type: DirectoryOrCreate
    - name: intent-shim
      emptyDir: {}
    - name: agent-sock
      hostPath:
        path: /run/mxl/agent.sock
        type: Socket
