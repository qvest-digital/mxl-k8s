name: chart

on:
  pull_request:
    paths:
      - 'charts/mxl-k8s/**'
      - 'config/crd/**'
      - '.github/workflows/chart.yml'
  push:
    branches: [main]
    paths:
      - 'charts/mxl-k8s/**'
      - 'config/crd/**'
      - '.github/workflows/chart.yml'
    tags: ['charts/mxl-k8s/v*.*.*']

permissions:
  contents: write
  packages: write

concurrency:
  group: chart-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # helm-schema and helm-unittest tags upstream are bare semver (no v
  # prefix); go install and helm plugin install accept that form.
  HELM_VERSION: v3.18.4
  HELM_UNITTEST_VERSION: "1.1.0"
  HELM_SCHEMA_VERSION: "0.23.2"
  HELM_DOCS_VERSION: v1.14.2
  KUBECONFORM_VERSION: v0.6.7
  # mikefarah/yq for in-place yaml editing of values.yaml at
  # package-time. Pinned because we rely on `yq -i` semantics.
  YQ_VERSION: v4.44.6

jobs:
  meta:
    runs-on: ubuntu-24.04
    outputs:
      publish: ${{ steps.m.outputs.publish }}
      version: ${{ steps.m.outputs.version }}
    steps:
      - id: m
        run: |
          set -eu
          short_sha="${GITHUB_SHA:0:7}"
          publish=false
          version=""

          case "$GITHUB_EVENT_NAME" in
            push)
              if [ "$GITHUB_REF_TYPE" = "tag" ]; then
                # refs/tags/charts/mxl-k8s/vX.Y.Z[-rc.N]
                version="${GITHUB_REF_NAME##*/v}"
                publish=true
              elif [ "$GITHUB_REF" = "refs/heads/main" ]; then
                # SemVer-valid prerelease build for the floating dev channel.
                # OCI translates "+" to "_" at push time.
                version="0.0.0-dev+sha.${short_sha}"
                publish=true
              fi
              ;;
          esac

          {
            echo "publish=${publish}"
            echo "version=${version}"
          } >> "$GITHUB_OUTPUT"

  lint:
    runs-on: ubuntu-24.04
    needs: meta
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Install helm-unittest
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version "${HELM_UNITTEST_VERSION}"

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          check-latest: true

      - name: Install helm-schema and helm-docs
        run: |
          go install github.com/dadav/helm-schema/cmd/helm-schema@${HELM_SCHEMA_VERSION}
          go install github.com/norwoodj/helm-docs/cmd/helm-docs@${HELM_DOCS_VERSION}

      - name: CRD sync drift check
        run: |
          set -eu
          for f in config/crd/mxl.qvest-digital.com_*.yaml; do
            dest="charts/mxl-k8s/crds/$(basename "$f")"
            if ! cmp -s "$f" "$dest"; then
              echo "::error::chart CRD copy $dest is out of sync with $f"
              echo "Run 'make chart-crd-sync' and commit the result."
              diff -u "$f" "$dest" || true
              exit 1
            fi
          done

      - name: helm lint
        run: helm lint charts/mxl-k8s

      - name: Schema drift check
        run: |
          set -eu
          ~/go/bin/helm-schema --chart-search-root charts/mxl-k8s \
            --append-newline --helm-docs-compatibility-mode \
            --skip-auto-generation additionalProperties
          if ! git diff --exit-code charts/mxl-k8s/values.schema.json; then
            echo "::error::values.schema.json is out of sync with values.yaml"
            echo "Run 'make chart-schema' and commit the result."
            exit 1
          fi

      - name: helm-docs drift check
        run: |
          set -eu
          ~/go/bin/helm-docs --chart-search-root charts
          if ! git diff --exit-code charts/mxl-k8s/README.md; then
            echo "::error::charts/mxl-k8s/README.md is out of sync with values.yaml"
            echo "Run 'make chart-docs' and commit the result."
            exit 1
          fi

      - name: helm unittest
        run: helm unittest charts/mxl-k8s -f 'tests/unit/*_test.yaml'

  render:
    runs-on: ubuntu-24.04
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        values: [minimal-tcp, full-rdma, all-disabled, crds-only, custom-registry]
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Install kubeconform
        run: |
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin kubeconform
          kubeconform -v

      - name: Render scenario
        run: |
          helm template mxl charts/mxl-k8s \
            -f charts/mxl-k8s/tests/values/${{ matrix.values }}.yaml \
            --namespace mxl-system > /tmp/render.yaml

      - name: Validate against Kubernetes schemas
        run: |
          kubeconform -strict -summary \
            -ignore-missing-schemas \
            -schema-location default \
            /tmp/render.yaml

  package-push:
    runs-on: ubuntu-24.04
    needs: [meta, lint, render]
    if: needs.meta.outputs.publish == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Install yq
        run: |
          set -eu
          curl -fsSL \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" \
            -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq
          yq --version

      # Source values.yaml ships every <component>.image.tag empty so a
      # `helm install ./charts/mxl-k8s` from a clone falls back to
      # `v<Chart.AppVersion>` via templates/_helpers.tpl. The published
      # artifact, by contrast, must pin each component to the actual tag
      # `images.yml` produced for that component's last release: chart
      # versions and component versions are independent. The branch below
      # picks the right tag depending on what kind of chart build this is.
      - name: Resolve per-component image tags into values.yaml
        id: resolve
        env:
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -eu
          components="operator agent gateway"

          case "$VERSION" in
            0.0.0-dev*)
              # On push to main, images.yml publishes <component>:dev. The
              # chart's :dev artifact tracks main HEAD images and pins them
              # all to the dev tag.
              kind=dev
              for c in $components; do
                yq -i ".${c}.image.tag = \"dev\"" charts/mxl-k8s/values.yaml
              done
              ;;
            *-*)
              # Chart prerelease (rc). Each component's current rc is in
              # the prerelease manifest. The published image tag for that
              # rc carries the `v` prefix (see images.yml).
              kind=rc
              for c in $components; do
                v=$(jq -r ".\"${c}\"" .github/prerelease-manifest.json)
                yq -i ".${c}.image.tag = \"v${v}\"" charts/mxl-k8s/values.yaml
              done
              ;;
            *)
              # Stable chart release. Each component's stable version is
              # in the release manifest.
              kind=stable
              for c in $components; do
                v=$(jq -r ".\"${c}\"" .github/release-manifest.json)
                yq -i ".${c}.image.tag = \"v${v}\"" charts/mxl-k8s/values.yaml
              done
              ;;
          esac

          # Emit a Markdown table of resolved tags so the next step can
          # paste it into either the GitHub release notes or the
          # workflow summary.
          {
            echo "## Bundled component versions"
            echo ""
            echo "| Component | Image tag |"
            echo "| --- | --- |"
            for c in $components; do
              t=$(yq ".${c}.image.tag" charts/mxl-k8s/values.yaml)
              echo "| ${c} | \`${t}\` |"
            done
          } > /tmp/bundled.md

          echo "kind=${kind}" >> "$GITHUB_OUTPUT"

          echo "--- resolved values.yaml diff ---"
          git --no-pager diff -- charts/mxl-k8s/values.yaml

      - name: Package chart
        env:
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -eu
          helm package charts/mxl-k8s \
            --version "${VERSION}" \
            --app-version "${VERSION}" \
            --destination /tmp/chart

      - name: Push chart to OCI
        run: |
          set -eu
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          tgz=$(ls /tmp/chart/mxl-k8s-*.tgz)
          helm push "${tgz}" "oci://ghcr.io/${owner}/mxl-k8s/charts"

      # Append the bundled-component-versions table to either the
      # GitHub release notes (tag push -> release-please-action already
      # created the release) or the workflow summary (dev build).
      - name: Publish bundled-component table
        env:
          VERSION: ${{ needs.meta.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          if [ "${{ github.ref_type }}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
            existing=$(gh release view "${tag}" --json body --jq .body)
            { printf "%s\n\n" "${existing}"; cat /tmp/bundled.md; } \
              | gh release edit "${tag}" --notes-file -
          else
            cat /tmp/bundled.md >> "$GITHUB_STEP_SUMMARY"
          fi
