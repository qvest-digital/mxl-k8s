name: chart

on:
  pull_request:
    paths:
      - 'charts/mxl-k8s/**'
      - 'config/crd/**'
      - '.github/workflows/chart.yml'
  push:
    branches: [main]
    paths:
      - 'charts/mxl-k8s/**'
      - 'config/crd/**'
      - '.github/workflows/chart.yml'
  # release-please.yml calls this workflow as a reusable workflow
  # when a charts/mxl-k8s release tag has just been cut, gated on
  # the per-component release_created output. Pre-PAT a
  # release:published listener was not an option either: release-
  # please-action created the release with GITHUB_TOKEN and events
  # produced by GITHUB_TOKEN do not start downstream runs. With
  # release-please-action now authenticated through
  # RELEASE_PLEASE_TOKEN that restriction no longer applies, but
  # the explicit gating remains preferable to a tag-prefix filter
  # on release:published. workflow_dispatch covers manual recovery.
  workflow_call:
    inputs:
      release_tag:
        description: "charts/mxl-k8s release tag to package (e.g. charts/mxl-k8s/v1.0.0-rc.2)"
        type: string
        required: true
  workflow_dispatch:
    inputs:
      release_tag:
        description: "charts/mxl-k8s release tag to package (e.g. charts/mxl-k8s/v1.0.0-rc.2). Leave empty for a dev build of HEAD."
        type: string
        required: false
        default: ""

permissions:
  contents: write
  packages: write

concurrency:
  group: chart-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # Renovate tracks each of these via the inline `# renovate:` marker
  # on the line directly above the value (see the CI-tool-versions
  # custom manager in renovate.json). helm-schema tags are bare semver;
  # helm-unittest tags are v-prefixed, so extractVersion strips the v
  # to keep the bare value `helm plugin install --version` expects.
  # renovate: datasource=github-releases depName=helm/helm versioning=semver
  HELM_VERSION: v4.2.0
  # renovate: datasource=github-releases depName=helm-unittest/helm-unittest versioning=semver extractVersion=^v(?<version>.+)$
  HELM_UNITTEST_VERSION: "1.1.0"
  # renovate: datasource=github-releases depName=dadav/helm-schema versioning=semver
  HELM_SCHEMA_VERSION: "0.23.3"
  # renovate: datasource=go depName=github.com/norwoodj/helm-docs versioning=semver
  HELM_DOCS_VERSION: v1.14.2
  # renovate: datasource=github-releases depName=yannh/kubeconform versioning=semver
  KUBECONFORM_VERSION: v0.7.0
  # mikefarah/yq for in-place yaml editing of values.yaml at
  # package-time. Pinned because we rely on `yq -i` semantics.
  # renovate: datasource=github-releases depName=mikefarah/yq versioning=semver
  YQ_VERSION: v4.53.2

jobs:
  meta:
    runs-on: ubuntu-24.04
    outputs:
      publish: ${{ steps.m.outputs.publish }}
      version: ${{ steps.m.outputs.version }}
      release_tag: ${{ steps.m.outputs.release_tag }}
    env:
      # inputs.release_tag is set by both workflow_call (from
      # release-please.yml) and workflow_dispatch. It is absent on
      # pull_request / push.
      INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
    steps:
      - id: m
        run: |
          set -eu
          short_sha="${GITHUB_SHA:0:7}"
          publish=false
          version=""
          release_tag=""

          if [ -n "${INPUT_RELEASE_TAG:-}" ]; then
            # Called for a tagged release. Accept only chart tags;
            # anything else is a caller mistake worth failing on.
            case "$INPUT_RELEASE_TAG" in
              charts/mxl-k8s/v*.*.*)
                version="${INPUT_RELEASE_TAG##*/v}"
                release_tag="$INPUT_RELEASE_TAG"
                publish=true
                ;;
              *)
                echo "::error::release_tag '${INPUT_RELEASE_TAG}' is not a charts/mxl-k8s tag"
                exit 1
                ;;
            esac
          elif [ "$GITHUB_EVENT_NAME" = "push" ] && [ "$GITHUB_REF" = "refs/heads/main" ]; then
            # SemVer-valid prerelease build for the floating dev channel.
            # OCI translates "+" to "_" at push time.
            version="0.0.0-dev+sha.${short_sha}"
            publish=true
          fi

          {
            echo "publish=${publish}"
            echo "version=${version}"
            echo "release_tag=${release_tag}"
          } >> "$GITHUB_OUTPUT"

  lint:
    runs-on: ubuntu-24.04
    needs: meta
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Install helm-unittest
        # helm 4 verifies plugin provenance by default and aborts when
        # the source ships none; the unittest release has no signature,
        # so opt out of verification explicitly.
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version "${HELM_UNITTEST_VERSION}" --verify=false

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          check-latest: true

      - name: Install helm-schema and helm-docs
        run: |
          go install github.com/dadav/helm-schema/cmd/helm-schema@${HELM_SCHEMA_VERSION}
          go install github.com/norwoodj/helm-docs/cmd/helm-docs@${HELM_DOCS_VERSION}

      - name: CRD sync drift check
        run: |
          set -eu
          for f in config/crd/mxl.qvest-digital.com_*.yaml; do
            dest="charts/mxl-k8s/crds/$(basename "$f")"
            if ! cmp -s "$f" "$dest"; then
              echo "::error::chart CRD copy $dest is out of sync with $f"
              echo "Run 'make chart-crd-sync' and commit the result."
              diff -u "$f" "$dest" || true
              exit 1
            fi
          done

      - name: helm lint
        run: helm lint charts/mxl-k8s

      - name: Schema drift check
        run: |
          set -eu
          ~/go/bin/helm-schema --chart-search-root charts/mxl-k8s \
            --append-newline --helm-docs-compatibility-mode \
            --skip-auto-generation additionalProperties
          if ! git diff --exit-code charts/mxl-k8s/values.schema.json; then
            echo "::error::values.schema.json is out of sync with values.yaml"
            echo "Run 'make chart-schema' and commit the result."
            exit 1
          fi

      - name: helm-docs drift check
        run: |
          set -eu
          ~/go/bin/helm-docs --chart-search-root charts
          if ! git diff --exit-code charts/mxl-k8s/README.md; then
            echo "::error::charts/mxl-k8s/README.md is out of sync with values.yaml"
            echo "Run 'make chart-docs' and commit the result."
            exit 1
          fi

      - name: helm unittest
        run: helm unittest charts/mxl-k8s -f 'tests/unit/*_test.yaml'

  render:
    runs-on: ubuntu-24.04
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        values: [minimal-tcp, full-rdma, all-disabled, crds-only, custom-registry]
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Install kubeconform
        run: |
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin kubeconform
          kubeconform -v

      - name: Render scenario
        run: |
          helm template mxl charts/mxl-k8s \
            -f charts/mxl-k8s/tests/values/${{ matrix.values }}.yaml \
            --namespace mxl-system > /tmp/render.yaml

      - name: Validate against Kubernetes schemas
        run: |
          kubeconform -strict -summary \
            -ignore-missing-schemas \
            -schema-location default \
            /tmp/render.yaml

  package-push:
    runs-on: ubuntu-24.04
    needs: [meta, lint, render]
    if: needs.meta.outputs.publish == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Install yq
        run: |
          set -eu
          curl -fsSL \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" \
            -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq
          yq --version

      # hack/chart-resolve-tags.sh emits the bundled-component table and,
      # for the floating dev build (0.0.0-dev*), rewrites each
      # <component>.image.tag to "dev" so the dev chart tracks main HEAD
      # images. Release builds keep the per-component pins committed in
      # values.yaml (Renovate keeps those current), so the diff below is
      # empty for a release and confirms it ships exactly those pins. The
      # table is saved for the publish-bundled-component-table step.
      - name: Emit bundled-component table (dev build pins :dev)
        env:
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -eu
          bash hack/chart-resolve-tags.sh "$VERSION" > /tmp/bundled.md
          echo "--- resolved values.yaml diff ---"
          git --no-pager diff -- charts/mxl-k8s/values.yaml

      - name: Package chart
        env:
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -eu
          helm package charts/mxl-k8s \
            --version "${VERSION}" \
            --app-version "${VERSION}" \
            --destination /tmp/chart

      - name: Push chart to OCI
        run: |
          set -eu
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          tgz=$(ls /tmp/chart/mxl-k8s-*.tgz)
          helm push "${tgz}" "oci://ghcr.io/${owner}/mxl-k8s/charts"

      # Append the bundled-component-versions table to either the
      # GitHub release notes (release_tag is set by the caller in
      # release-please.yml, or by a manual workflow_dispatch) or
      # the workflow summary (dev build off main).
      - name: Publish bundled-component table
        env:
          VERSION: ${{ needs.meta.outputs.version }}
          RELEASE_TAG: ${{ needs.meta.outputs.release_tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          if [ -n "${RELEASE_TAG:-}" ]; then
            existing=$(gh release view "${RELEASE_TAG}" --json body --jq .body)
            { printf "%s\n\n" "${existing}"; cat /tmp/bundled.md; } \
              | gh release edit "${RELEASE_TAG}" --notes-file -
          else
            cat /tmp/bundled.md >> "$GITHUB_STEP_SUMMARY"
          fi
