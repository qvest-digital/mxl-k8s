name: images

on:
  push:
    branches: [main]
    # Manual escape hatch: a developer pushing a tag from a shell.
    # release-please-driven publishes go through workflow_call from
    # release-please.yml because tags created by GITHUB_TOKEN do not
    # start downstream workflow runs.
    tags: ['*/v*.*.*']
  pull_request:
  # Invoked from release-please.yml once a per-component release
  # tag has just been cut (operator/agent/gateway/shim). The tag
  # is passed in via release_tag; meta resolves the image to
  # publish from the tag's prefix.
  workflow_call:
    inputs:
      release_tag:
        description: "Per-component release tag (e.g. agent/v1.0.0-rc.2)"
        type: string
        required: true
  # Manual recovery: re-run an image publish without waiting for a
  # new tag. Leave release_tag empty to build the :dev / :sha-X
  # tags for the current main, or pass <component>/v<X> to
  # republish that exact tag.
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Per-component release tag (e.g. agent/v1.0.0-rc.2). Leave empty for a dev build of HEAD."
        type: string
        required: false
        default: ""

permissions:
  contents: read
  packages: write
  # dorny/paths-filter calls the PR Files API for pull_request
  # events; without pull-requests:read GITHUB_TOKEN can't list the
  # changed files and the action fails with
  # "Resource not accessible by integration".
  pull-requests: read

concurrency:
  # Include release_tag so distinct workflow_call / workflow_dispatch
  # backfills (one per component tag) get their own queue slot and
  # don't cancel each other. PR / push / tag-event invocations key
  # on the ref as before.
  group: images-${{ github.workflow }}-${{ inputs.release_tag || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Per-image filter for PR / push-to-main events. Each filter lists
  # every input that the image's docker build context actually
  # depends on. See CLAUDE.md for the contract: when a Dockerfile
  # starts COPYing a new sibling module, that module must be added
  # here so the image rebuilds on the dependency's changes.
  # Tag-event builds bypass this filter entirely; a release tag is
  # an explicit "publish this image now" signal regardless of diff.
  changes:
    # Diff-based filtering only makes sense for PR / push-to-branch
    # events. Tag pushes, workflow_call and workflow_dispatch carry
    # an explicit release_tag (or the dev-build sentinel) and
    # bypass the per-image filter in meta.
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_type == 'branch')
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    outputs:
      operator:   ${{ steps.f.outputs.operator }}
      agent:      ${{ steps.f.outputs.agent }}
      gateway:    ${{ steps.f.outputs.gateway }}
      shim:       ${{ steps.f.outputs.shim }}
      demo_tools: ${{ steps.f.outputs.demo_tools }}
      workflow:   ${{ steps.f.outputs.workflow }}
      kind:       ${{ steps.f.outputs.kind }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: f
        with:
          filters: |
            operator:   ['docker/operator.Dockerfile', 'operator/**', 'api/**', 'go.work*']
            agent:      ['docker/agent.Dockerfile', 'agent/**', 'api/**', 'go.work*']
            gateway:    ['docker/gateway.Dockerfile', 'gateway/**', 'api/**', 'go.work*']
            shim:       ['docker/shim.Dockerfile', 'shim/**']
            demo_tools: ['docker/demo-tools.Dockerfile']
            workflow:   ['.github/workflows/images.yml']
            kind:
              - 'hack/kind-*'
              - 'docker/**'
              - 'examples/tcp-demo/**'
              - 'config/crd/**'
              - 'config/rbac/**'
              - 'charts/mxl-k8s/**'
              - 'Makefile'
              - 'test/integration/kind/**'
              - '.github/workflows/images.yml'

  # Compute the list of images to build and the registry references /
  # tag lists each image should be published under. Centralised here
  # so build and merge agree on what to publish.
  #
  # The images list is a JSON array consumed by the build matrix
  # below. On a per-component tag push or a workflow_call/dispatch
  # carrying release_tag, only the matching image is included. On
  # main / PR events the list is filtered by the changes job; an
  # unrelated diff publishes nothing.
  meta:
    needs: changes
    # changes is skipped for tag pushes, workflow_call and
    # workflow_dispatch (none of those rely on diff-based filtering),
    # so meta must run even when its dependency was skipped.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-24.04
    outputs:
      images: ${{ steps.m.outputs.images }}
      push: ${{ steps.m.outputs.push }}
      has_images: ${{ steps.m.outputs.has_images }}
      kind_wanted: ${{ steps.m.outputs.kind_wanted }}
      sha_short: ${{ steps.m.outputs.sha_short }}
    env:
      INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
      # kind-integration eligibility (kind_wanted below):
      # - pull_request: changes.kind == true on a same-repo PR, OR a
      #   `run-kind` label is attached (opt-in escape hatch).
      # - push to main (branch): changes.kind == true and push == true
      #   (release-please merges already toggled push=false above).
      # - workflow_dispatch with empty release_tag: always true.
      # - tag push / workflow_call with release_tag: false. Release
      #   publishes are not gated on a smoke test.
      CHANGED_KIND:   ${{ needs.changes.outputs.kind   || 'false' }}
      PR_LABELS_JSON: ${{ toJSON(github.event.pull_request.labels.*.name) }}
      # head_commit is present on push events; empty otherwise. Used
      # to detect release-please's own merge commits and defer their
      # image publish to the workflow_call run that release-please.yml
      # fires alongside, so the same content isn't built twice.
      HEAD_COMMIT_MSG: ${{ github.event.head_commit.message }}
      # When `changes` is skipped, needs.changes.outputs.<x> is the
      # empty string. Defaulting to 'true' falls back to "build it"
      # for the no-filter case (manual workflow_dispatch dev build);
      # tag / release_tag paths bypass the wanted check entirely via
      # `selected`.
      CHANGED_OPERATOR:   ${{ needs.changes.outputs.operator   || 'true' }}
      CHANGED_AGENT:      ${{ needs.changes.outputs.agent      || 'true' }}
      CHANGED_GATEWAY:    ${{ needs.changes.outputs.gateway    || 'true' }}
      CHANGED_SHIM:       ${{ needs.changes.outputs.shim       || 'true' }}
      CHANGED_DEMO_TOOLS: ${{ needs.changes.outputs.demo_tools || 'true' }}
      CHANGED_WORKFLOW:   ${{ needs.changes.outputs.workflow   || 'false' }}
    steps:
      - id: m
        run: |
          set -eu
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          prefix="ghcr.io/${owner}/mxl-k8s"
          short_sha="${GITHUB_SHA:0:7}"

          # All images this repo ships. Order matches docker/ listing.
          declare -a all=(
            "operator|docker/operator.Dockerfile"
            "agent|docker/agent.Dockerfile"
            "gateway|docker/gateway.Dockerfile"
            "shim|docker/shim.Dockerfile"
            "demo-tools|docker/demo-tools.Dockerfile"
          )

          # Per-image change flags from the changes job. A workflow-
          # file edit expands the set to all images so an edit cannot
          # silently exclude an image from the publish surface.
          declare -A wanted=(
            [operator]="$CHANGED_OPERATOR"
            [agent]="$CHANGED_AGENT"
            [gateway]="$CHANGED_GATEWAY"
            [shim]="$CHANGED_SHIM"
            [demo-tools]="$CHANGED_DEMO_TOOLS"
          )
          if [ "$CHANGED_WORKFLOW" = "true" ]; then
            for k in "${!wanted[@]}"; do wanted[$k]=true; done
          fi

          push=false
          selected=""
          declare -a extra_tags=()

          # tag_release applies the version-tag publish convention
          # (:v<X>, plus :latest or :pre) from a "<component>/v<X>"
          # ref. Shared by direct tag pushes and the release_tag
          # input path so both produce identical tag lists.
          tag_release() {
            local ref="$1" version
            selected="${ref%%/*}"
            version="${ref#*/v}"
            extra_tags+=("v${version}")
            case "$version" in
              *-*) extra_tags+=("pre") ;;
              *)   extra_tags+=("latest") ;;
            esac
          }

          if [ -n "${INPUT_RELEASE_TAG:-}" ]; then
            push=true
            case "$INPUT_RELEASE_TAG" in
              */v*.*.*) ;;
              *)
                echo "::error::release_tag '${INPUT_RELEASE_TAG}' is not a <component>/v<X.Y.Z> tag"
                exit 1
                ;;
            esac
            tag_release "$INPUT_RELEASE_TAG"
            # This run IS the release publish for the matching
            # component. The push-to-main run that fired alongside is
            # skipped (see the release-please-commit detection below),
            # so add :dev and :sha-<short> here too. The commit being
            # tagged is the current main HEAD by release-please's
            # construction, so :dev tracking HEAD stays consistent.
            extra_tags+=("dev" "sha-${short_sha}")
          elif [ "$GITHUB_EVENT_NAME" = "push" ]; then
            if [ "$GITHUB_REF_TYPE" = "tag" ]; then
              push=true
              tag_release "$GITHUB_REF_NAME"
            else
              # Push to main: :dev tracks HEAD; :sha-<short> is the
              # content-addressed handle. Defer release-please's own
              # merge commits to the workflow_call invocation from
              # release-please.yml so the same content isn't built
              # twice (push-to-main run alongside workflow_call run).
              # release-please's PR titles always start with
              # "chore(main): release "; the squash-merge subject
              # carries that prefix verbatim.
              case "${HEAD_COMMIT_MSG%%$'\n'*}" in
                "chore(main): release "*)
                  echo "Release-please merge commit; image publish deferred to workflow_call from release-please.yml."
                  push=false
                  # Empty the wanted set so the loop below produces
                  # an empty images list and build/merge skip.
                  for k in "${!wanted[@]}"; do wanted[$k]=false; done
                  ;;
                *)
                  push=true
                  extra_tags+=("dev" "sha-${short_sha}")
                  ;;
              esac
            fi
          elif [ "$GITHUB_EVENT_NAME" = "pull_request" ] \
              && [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
            push=true
            extra_tags+=("pr-${{ github.event.number }}-${short_sha}")
          elif [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            # Manual recovery with an empty release_tag: republish
            # :dev and :sha-<short> for the current HEAD on every
            # image. Same effect as a push-to-main run, but on
            # demand.
            push=true
            extra_tags+=("dev" "sha-${short_sha}")
          fi

          # Build the images JSON. For fork PRs (push=false) we still
          # include every image we'd otherwise build so the matrix
          # exercises the Dockerfiles; nothing gets pushed.
          images='['
          first=true
          for entry in "${all[@]}"; do
            name="${entry%%|*}"
            dockerfile="${entry#*|}"
            if [ -n "$selected" ]; then
              # Tag-driven release: include only the matching image.
              if [ "$name" != "$selected" ]; then continue; fi
            else
              # Push/PR: respect the per-image filter from the changes
              # job. Unaffected images skip the build entirely.
              if [ "${wanted[$name]:-false}" != "true" ]; then continue; fi
            fi
            image="${prefix}/${name}"
            tags=""
            if [ ${#extra_tags[@]} -gt 0 ]; then
              for t in "${extra_tags[@]}"; do
                if [ -z "$tags" ]; then tags="${image}:${t}"; else tags="${tags},${image}:${t}"; fi
              done
            fi
            $first || images="${images},"
            images="${images}{\"name\":\"${name}\",\"dockerfile\":\"${dockerfile}\",\"image\":\"${image}\",\"tags\":\"${tags}\"}"
            first=false
          done
          images="${images}]"

          if [ "$first" = "true" ]; then
            has_images=false
          else
            has_images=true
          fi

          # kind-integration eligibility. The kind path is a pre-
          # release smoke test, not a release gate, so tag pushes and
          # workflow_call-with-release_tag invocations always skip.
          # has_images=false short-circuits to false too: with no
          # images to build, there is nothing for kind to load.
          kind_wanted=false
          case "$GITHUB_EVENT_NAME" in
            pull_request)
              # Fork PRs are excluded -- the per-PR image tag is not
              # pushed to GHCR, so there is no manifest to kind-load.
              if [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
                if [ "$CHANGED_KIND" = "true" ]; then
                  kind_wanted=true
                elif echo "${PR_LABELS_JSON:-[]}" | grep -q '"run-kind"'; then
                  kind_wanted=true
                fi
              fi
              ;;
            push)
              if [ "$GITHUB_REF_TYPE" = "branch" ] \
                  && [ "$GITHUB_REF" = "refs/heads/main" ] \
                  && [ "$CHANGED_KIND" = "true" ] \
                  && [ "$push" = "true" ]; then
                kind_wanted=true
              fi
              ;;
            workflow_dispatch)
              if [ -z "${INPUT_RELEASE_TAG:-}" ]; then
                kind_wanted=true
              fi
              ;;
          esac
          if [ "$has_images" != "true" ]; then
            kind_wanted=false
          fi

          {
            echo "push=${push}"
            echo "images=${images}"
            echo "has_images=${has_images}"
            echo "kind_wanted=${kind_wanted}"
            echo "sha_short=${short_sha}"
          } >> "$GITHUB_OUTPUT"

  # Per-image, per-arch build. Each cell builds on the matching native
  # runner and (when push=true) writes a per-digest entry to GHCR. The
  # digest is uploaded as an artifact so the merge job can stitch the
  # two arches into one multi-arch manifest list per tag.
  build:
    needs: meta
    # `!cancelled()` defeats the implicit success() check on needs.
    # Without it, build would be skipped whenever a transitive need
    # (the changes job, which is skipped for tag / workflow_call /
    # workflow_dispatch events) was non-success, even though the
    # explicit condition below would otherwise have run it.
    if: ${{ !cancelled() && needs.meta.outputs.has_images == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.meta.outputs.images) }}
        runner:
          - { arch: amd64, runs_on: ubuntu-24.04,     platform: linux/amd64 }
          - { arch: arm64, runs_on: ubuntu-24.04-arm, platform: linux/arm64 }
    runs-on: ${{ matrix.runner.runs_on }}
    timeout-minutes: 60
    steps:
      # When invoked with a release_tag (workflow_call from release-
      # please.yml or workflow_dispatch backfilling a missed tag),
      # check out the tag's commit rather than the workflow's
      # triggering ref. The default ref is main HEAD, which can have
      # drifted from the tag's content; building from there would
      # publish "v<X>" tags pointing at a binary that isn't the
      # tag's source.
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag || github.ref }}

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: needs.meta.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (push by digest)
        if: needs.meta.outputs.push == 'true'
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: ${{ matrix.runner.platform }}
          outputs: type=image,name=${{ matrix.image.image }},push-by-digest=true,name-canonical=true,push=true
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image.name }}-${{ matrix.runner.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}-${{ matrix.runner.arch }}

      # Fork PRs can't write to the package registry, so fall back to a
      # local build that just validates the Dockerfile compiles.
      - name: Build (validate only)
        if: needs.meta.outputs.push != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: ${{ matrix.runner.platform }}
          push: false
          cache-from: type=gha,scope=${{ matrix.image.name }}-${{ matrix.runner.arch }}

      - name: Export digest
        if: needs.meta.outputs.push == 'true'
        run: |
          set -eu
          mkdir -p "${RUNNER_TEMP}/digests"
          d="${{ steps.push.outputs.digest }}"
          touch "${RUNNER_TEMP}/digests/${d#sha256:}"

      - name: Upload digest
        if: needs.meta.outputs.push == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.image.name }}-${{ matrix.runner.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Stitch the per-arch digests of each image into one multi-arch
  # manifest list, applying the full tag list computed by meta.
  merge:
    needs: [meta, build]
    if: ${{ !cancelled() && needs.meta.outputs.push == 'true' && needs.meta.outputs.has_images == 'true' }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.meta.outputs.images) }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ matrix.image.name }}-*
          merge-multiple: false

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list
        env:
          IMAGE: ${{ matrix.image.image }}
          TAGS: ${{ matrix.image.tags }}
        working-directory: ${{ runner.temp }}/digests
        run: |
          set -euo pipefail
          tag_args=""
          IFS=,
          for t in $TAGS; do tag_args="$tag_args -t $t"; done
          unset IFS
          refs=""
          for f in digests-${{ matrix.image.name }}-*/*; do
            digest=$(basename "$f")
            refs="$refs ${IMAGE}@sha256:${digest}"
          done
          echo "creating manifest for $IMAGE with tags:$tag_args" >&2
          # shellcheck disable=SC2086
          docker buildx imagetools create $tag_args $refs

      - name: Inspect
        run: |
          first=$(echo '${{ matrix.image.tags }}' | cut -d, -f1)
          docker buildx imagetools inspect "$first"

  # Bring up a 3-node KIND cluster on the runner, point `make kind-up`
  # at the per-PR multi-arch manifest the `merge` job just published,
  # and exercise the integration suite under test/integration/kind.
  # Gated by meta.kind_wanted so unrelated diffs skip cleanly. Tag
  # publishes and workflow_call-with-release_tag invocations skip by
  # design -- the kind path is a pre-release smoke test, not a
  # release gate.
  kind-integration:
    needs: [meta, build, merge]
    if: ${{ !cancelled() && needs.meta.outputs.kind_wanted == 'true' && needs.merge.result == 'success' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      # install_only avoids creating a stub cluster here; hack/kind-up.sh
      # creates the real one against hack/kind-config.yaml.
      - uses: helm/kind-action@v1
        with:
          install_only: true

      - uses: azure/setup-kubectl@v4

      # `make kind-up BUILD=<tag>` pulls images from GHCR. GHCR
      # packages are private regardless of event, so the runner
      # must log in first.
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Bring up KIND demo against merge-published images
        env:
          BUILD: ${{ github.event_name == 'pull_request' && format('pr-{0}-{1}', github.event.number, needs.meta.outputs.sha_short) || 'dev' }}
          IMAGE_REGISTRY_RAW: ghcr.io/${{ github.repository_owner }}/mxl-k8s
          KIND_CLUSTER: mxl-k8s-ci
          # Hosted runners are slower on first image pull than a
          # developer laptop; raise the kind-up defaults (180 / 300)
          # to absorb that without changing the script's defaults.
          MIRROR_TIMEOUT_SECS: 240
          ROLLOUT_TIMEOUT_SECS: 360
        run: |
          set -euo pipefail
          IMAGE_REGISTRY=$(echo "$IMAGE_REGISTRY_RAW" | tr '[:upper:]' '[:lower:]')
          make kind-up \
            BUILD="$BUILD" \
            IMAGE_REGISTRY="$IMAGE_REGISTRY" \
            KIND_CLUSTER="$KIND_CLUSTER"

      - name: Run integration suite
        env:
          KIND_CLUSTER: mxl-k8s-ci
          KIND_DIAG_DIR: ${{ runner.temp }}/kind-diagnostics
        run: make kind-test KIND_CLUSTER="$KIND_CLUSTER" KIND_DIAG_DIR="$KIND_DIAG_DIR"

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: kind-diagnostics-${{ github.run_id }}
          path: ${{ runner.temp }}/kind-diagnostics
          if-no-files-found: ignore
          retention-days: 7

  # Branch-protection target. Always runs, succeeds only when every
  # required upstream job is in `success` or `skipped` state. Without
  # this gate, branch protection would need to enumerate every
  # conditional job individually and would block PRs that legitimately
  # skipped one.
  images-summary:
    needs: [changes, meta, build, merge, kind-integration]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - name: Verify upstream jobs
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          set -eu
          echo "$NEEDS" | jq -r 'to_entries[] | "\(.key): \(.value.result)"'
          bad=$(echo "$NEEDS" | jq '[.[] | select(.result == "failure" or .result == "cancelled")] | length')
          if [ "$bad" -ne 0 ]; then
            echo "::error::$bad required job(s) failed or were cancelled"
            exit 1
          fi
