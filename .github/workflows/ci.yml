name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  GOTESTSUM_VERSION: v1.13.0
  SETUP_ENVTEST_VERSION: release-0.22
  ENVTEST_K8S_VERSION: "1.31.0"

jobs:
  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          check-latest: true

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "Files need gofmt:"
            echo "$out"
            exit 1
          fi

      - name: go vet (pure-Go modules)
        run: |
          for m in api ipc operator agent; do
            echo ">> go vet ./... in $m"
            (cd "$m" && go vet ./...)
          done

      - name: go build (pure-Go modules)
        run: |
          for m in api ipc operator agent; do
            echo ">> go build ./... in $m"
            (cd "$m" && go build ./...)
          done

  # gateway is the cgo lane. It links libmxl + libmxl-fabrics and so
  # runs inside go-mxl's published builder image, which already has
  # the Go toolchain, libmxl, libmxl-fabrics, libfabric, and a sane
  # PKG_CONFIG_PATH set up. The image tag is bumped here (and in
  # docs/BUILD.md) when go-mxl ships a new release; renovate also
  # picks it up.
  gateway:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/qvest-digital/go-mxl-builder:1.0.0-rc.5
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Mark workspace as a safe git directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: gofmt
        run: |
          cd gateway
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "Files need gofmt:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: cd gateway && go vet ./...

      - name: go build
        run: cd gateway && go build ./...

  manifests-check:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          check-latest: true

      - name: Regenerate manifests
        run: make gen-api gen-rbac

      - name: Check no drift in generated files
        run: |
          if ! git diff --exit-code -- config/ api/v1alpha1/zz_generated.deepcopy.go; then
            echo "::error::generated files are out of date; run 'make gen-api gen-rbac' and commit the result"
            exit 1
          fi

  ipc-check:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          check-latest: true

      - name: Regenerate proto
        run: make gen-ipc

      - name: Check no drift in generated proto files
        run: |
          if ! git diff --exit-code -- ipc/v1; then
            echo "::error::generated proto files are out of date; run 'make gen-ipc' and commit the result"
            exit 1
          fi

  # The test job runs unit tests for every pure-Go module in a matrix.
  # Each shard produces a JUnit XML and a coverage profile; the report
  # job downloads them and publishes a single check + PR comment.
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        module: [api, ipc, operator, agent]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          check-latest: true
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Cache envtest binaries
        if: matrix.module == 'operator'
        uses: actions/cache@v5
        with:
          path: bin/k8s
          key: envtest-${{ runner.os }}-${{ env.ENVTEST_K8S_VERSION }}-${{ env.SETUP_ENVTEST_VERSION }}

      - name: Provision envtest assets
        if: matrix.module == 'operator'
        run: |
          mkdir -p bin
          go run sigs.k8s.io/controller-runtime/tools/setup-envtest@${SETUP_ENVTEST_VERSION} \
            use ${ENVTEST_K8S_VERSION} --bin-dir="${GITHUB_WORKSPACE}/bin" >/dev/null

      - name: Resolve KUBEBUILDER_ASSETS
        if: matrix.module == 'operator'
        id: envtest
        run: |
          path=$(go run sigs.k8s.io/controller-runtime/tools/setup-envtest@${SETUP_ENVTEST_VERSION} \
            use ${ENVTEST_K8S_VERSION} --bin-dir="${GITHUB_WORKSPACE}/bin" -p path)
          echo "path=$path" >> "$GITHUB_OUTPUT"

      - name: Run tests
        env:
          KUBEBUILDER_ASSETS: ${{ steps.envtest.outputs.path }}
        run: |
          mkdir -p bin
          cd "${{ matrix.module }}"
          go run gotest.tools/gotestsum@${GOTESTSUM_VERSION} \
            --format=testname \
            --junitfile="${GITHUB_WORKSPACE}/bin/junit-${{ matrix.module }}.xml" \
            --jsonfile="${GITHUB_WORKSPACE}/bin/test-${{ matrix.module }}.json" \
            -- -race -timeout 5m \
            -coverprofile="${GITHUB_WORKSPACE}/bin/cover-${{ matrix.module }}.out" \
            -covermode=atomic \
            ./...

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.module }}
          if-no-files-found: ignore
          path: |
            bin/junit-${{ matrix.module }}.xml
            bin/test-${{ matrix.module }}.json
            bin/cover-${{ matrix.module }}.out

  # gateway tests run in the cgo lane because the package under test
  # links libmxl + libmxl-fabrics. Tests themselves use mocked
  # interfaces, but the production code must still compile.
  test-gateway:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/qvest-digital/go-mxl-builder:1.0.0-rc.5
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Mark workspace as a safe git directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Run tests
        run: |
          mkdir -p bin
          cd gateway
          go run gotest.tools/gotestsum@${GOTESTSUM_VERSION} \
            --format=testname \
            --junitfile="${GITHUB_WORKSPACE}/bin/junit-gateway.xml" \
            --jsonfile="${GITHUB_WORKSPACE}/bin/test-gateway.json" \
            -- -race -timeout 5m \
            -coverprofile="${GITHUB_WORKSPACE}/bin/cover-gateway.out" \
            -covermode=atomic \
            ./...

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-gateway
          if-no-files-found: ignore
          path: |
            bin/junit-gateway.xml
            bin/test-gateway.json
            bin/cover-gateway.out

  # Aggregates per-module results into a single check + PR comment.
  # dorny/test-reporter publishes JUnit XML as a GitHub check with
  # per-failure source annotations. octocov consumes the coverage
  # profiles and reports a per-package + total summary.
  report:
    needs: [test, test-gateway]
    runs-on: ubuntu-24.04
    if: always()
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: bin
          pattern: test-results-*
          merge-multiple: true

      - name: Publish JUnit results
        uses: dorny/test-reporter@v3
        if: hashFiles('bin/junit-*.xml') != ''
        with:
          name: tests
          path: bin/junit-*.xml
          reporter: java-junit
          fail-on-error: false

      - uses: k1LoW/octocov-action@v1
        if: hashFiles('bin/cover-*.out') != ''
