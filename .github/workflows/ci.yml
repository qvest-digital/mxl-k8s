name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  # renovate: datasource=go depName=gotest.tools/gotestsum versioning=semver
  GOTESTSUM_VERSION: v1.13.0
  # SETUP_ENVTEST_VERSION (a controller-runtime release branch) and
  # ENVTEST_K8S_VERSION (an envtest asset version that trails upstream
  # Kubernetes) have no clean Renovate datasource and are bumped by
  # hand. Keep them in step with the Makefile copies.
  SETUP_ENVTEST_VERSION: release-0.22
  ENVTEST_K8S_VERSION: "1.31.0"

jobs:
  # Compute which downstream jobs actually need to run by comparing
  # the PR (or push) diff against the per-module dependency map. The
  # filters here are part of each module's "what depends on me"
  # contract: if a module starts importing a sibling, that sibling
  # must be added to the importing module's filter list so the test
  # job re-runs when the dependency changes. See CLAUDE.md.
  changes:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    outputs:
      api:          ${{ steps.f.outputs.api }}
      operator:     ${{ steps.f.outputs.operator }}
      agent:        ${{ steps.f.outputs.agent }}
      gateway:      ${{ steps.f.outputs.gateway }}
      generated:    ${{ steps.f.outputs.generated }}
      pure_go:      ${{ steps.f.outputs.pure_go }}
      workflow:     ${{ steps.f.outputs.workflow }}
      test_modules: ${{ steps.m.outputs.test_modules }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: f
        with:
          # Each filter lists the path globs whose change forces the
          # downstream jobs that consume this filter to run.
          # operator/agent/gateway include api/** because all three
          # import api/v1alpha1. Keep go.work* on every Go filter so
          # a workspace bump retests every module.
          filters: |
            api:       ['api/**', 'go.work*']
            operator:  ['operator/**', 'api/**', 'go.work*']
            agent:     ['agent/**', 'api/**', 'go.work*']
            gateway:   ['gateway/**', 'api/**', 'go.work*']
            generated: ['api/**', 'operator/**', 'Makefile']
            pure_go:   ['api/**', 'operator/**', 'agent/**', 'go.work*']
            workflow:  ['.github/workflows/ci.yml']
      - id: m
        # Build the JSON matrix of pure-Go modules whose tests need
        # to re-run. A workflow-file change expands the set to
        # everything (safer than guessing which jobs the edit
        # touched).
        run: |
          set -eu
          if [ '${{ steps.f.outputs.workflow }}' = 'true' ]; then
            echo 'test_modules=["api","operator","agent"]' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          modules='[]'
          [ '${{ steps.f.outputs.api }}'      = 'true' ] && modules=$(jq -c '. + ["api"]'      <<<"$modules")
          [ '${{ steps.f.outputs.operator }}' = 'true' ] && modules=$(jq -c '. + ["operator"]' <<<"$modules")
          [ '${{ steps.f.outputs.agent }}'    = 'true' ] && modules=$(jq -c '. + ["agent"]'    <<<"$modules")
          echo "test_modules=$modules" >> "$GITHUB_OUTPUT"

  lint:
    needs: changes
    if: needs.changes.outputs.pure_go == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          check-latest: true

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "Files need gofmt:"
            echo "$out"
            exit 1
          fi

      - name: go vet (pure-Go modules)
        run: |
          for m in api operator agent; do
            echo ">> go vet ./... in $m"
            (cd "$m" && go vet ./...)
          done

      - name: go build (pure-Go modules)
        run: |
          for m in api operator agent; do
            echo ">> go build ./... in $m"
            (cd "$m" && go build ./...)
          done

  # gateway is the cgo lane. It links libmxl + libmxl-fabrics and so
  # runs inside go-mxl's published builder image, which already has
  # the Go toolchain, libmxl, libmxl-fabrics, libfabric, and a sane
  # PKG_CONFIG_PATH set up. The image tag is bumped here (and in
  # docs/BUILD.md) when go-mxl ships a new release; renovate also
  # picks it up.
  gateway:
    needs: changes
    if: needs.changes.outputs.gateway == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/qvest-digital/go-mxl-builder:1.0.0-rc.9
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Mark workspace as a safe git directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: gofmt
        run: |
          cd gateway
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "Files need gofmt:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: cd gateway && go vet ./...

      - name: go build
        run: cd gateway && go build ./...

  manifests-check:
    needs: changes
    if: needs.changes.outputs.generated == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          check-latest: true

      - name: Regenerate manifests
        run: make gen-api gen-rbac

      - name: Check no drift in generated files
        run: |
          if ! git diff --exit-code -- config/ api/v1alpha1/zz_generated.deepcopy.go; then
            echo "::error::generated files are out of date; run 'make gen-api gen-rbac' and commit the result"
            exit 1
          fi

  # The test job runs unit tests for every pure-Go module in a matrix.
  # Each shard produces a JUnit XML and a coverage profile; the report
  # job downloads them and publishes a single check + PR comment.
  # The matrix is computed from the changes filter so only modules
  # whose dependency set moved are exercised.
  test:
    needs: changes
    if: needs.changes.outputs.test_modules != '[]'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.changes.outputs.test_modules) }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          check-latest: true
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Cache envtest binaries
        if: matrix.module == 'operator'
        uses: actions/cache@v6
        with:
          path: bin/k8s
          key: envtest-${{ runner.os }}-${{ env.ENVTEST_K8S_VERSION }}-${{ env.SETUP_ENVTEST_VERSION }}

      - name: Provision envtest assets
        if: matrix.module == 'operator'
        run: |
          mkdir -p bin
          go run sigs.k8s.io/controller-runtime/tools/setup-envtest@${SETUP_ENVTEST_VERSION} \
            use ${ENVTEST_K8S_VERSION} --bin-dir="${GITHUB_WORKSPACE}/bin" >/dev/null

      - name: Resolve KUBEBUILDER_ASSETS
        if: matrix.module == 'operator'
        id: envtest
        run: |
          path=$(go run sigs.k8s.io/controller-runtime/tools/setup-envtest@${SETUP_ENVTEST_VERSION} \
            use ${ENVTEST_K8S_VERSION} --bin-dir="${GITHUB_WORKSPACE}/bin" -p path)
          echo "path=$path" >> "$GITHUB_OUTPUT"

      - name: Run tests
        env:
          KUBEBUILDER_ASSETS: ${{ steps.envtest.outputs.path }}
        run: |
          mkdir -p bin
          cd "${{ matrix.module }}"
          go run gotest.tools/gotestsum@${GOTESTSUM_VERSION} \
            --format=testname \
            --junitfile="${GITHUB_WORKSPACE}/bin/junit-${{ matrix.module }}.xml" \
            --jsonfile="${GITHUB_WORKSPACE}/bin/test-${{ matrix.module }}.json" \
            -- -race -timeout 5m \
            -coverprofile="${GITHUB_WORKSPACE}/bin/cover-${{ matrix.module }}.out" \
            -covermode=atomic \
            ./...

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.module }}
          if-no-files-found: ignore
          path: |
            bin/junit-${{ matrix.module }}.xml
            bin/test-${{ matrix.module }}.json
            bin/cover-${{ matrix.module }}.out

  # gateway tests run in the cgo lane because the package under test
  # links libmxl + libmxl-fabrics. Tests themselves use mocked
  # interfaces, but the production code must still compile.
  test-gateway:
    needs: changes
    if: needs.changes.outputs.gateway == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/qvest-digital/go-mxl-builder:1.0.0-rc.9
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Mark workspace as a safe git directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Run tests
        run: |
          mkdir -p bin
          cd gateway
          go run gotest.tools/gotestsum@${GOTESTSUM_VERSION} \
            --format=testname \
            --junitfile="${GITHUB_WORKSPACE}/bin/junit-gateway.xml" \
            --jsonfile="${GITHUB_WORKSPACE}/bin/test-gateway.json" \
            -- -race -timeout 5m \
            -coverprofile="${GITHUB_WORKSPACE}/bin/cover-gateway.out" \
            -covermode=atomic \
            ./...

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-gateway
          if-no-files-found: ignore
          path: |
            bin/junit-gateway.xml
            bin/test-gateway.json
            bin/cover-gateway.out

  # Aggregates per-module results into a single check + PR comment.
  # dorny/test-reporter publishes JUnit XML as a GitHub check with
  # per-failure source annotations. octocov consumes the coverage
  # profiles and reports a per-package + total summary. Skipped
  # entirely when every test job upstream was skipped.
  report:
    needs: [test, test-gateway]
    if: ${{ !cancelled() && (needs.test.result == 'success' || needs.test-gateway.result == 'success') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          path: bin
          pattern: test-results-*
          merge-multiple: true

      - name: Publish JUnit results
        uses: dorny/test-reporter@v3
        if: hashFiles('bin/junit-*.xml') != ''
        with:
          name: tests
          path: bin/junit-*.xml
          reporter: java-junit
          fail-on-error: false

      - uses: k1LoW/octocov-action@v1
        if: hashFiles('bin/cover-*.out') != ''

  # Branch-protection target. Always runs, succeeds only when every
  # required upstream job is in `success` or `skipped` state. Without
  # this gate, branch protection would need to enumerate every
  # conditional job individually and would block PRs that legitimately
  # skipped one (skipped checks count as "not satisfied" otherwise).
  ci-summary:
    needs: [changes, lint, gateway, manifests-check, test, test-gateway, report]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - name: Verify upstream jobs
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          set -eu
          echo "$NEEDS" | jq -r 'to_entries[] | "\(.key): \(.value.result)"'
          bad=$(echo "$NEEDS" | jq '[.[] | select(.result == "failure" or .result == "cancelled")] | length')
          if [ "$bad" -ne 0 ]; then
            echo "::error::$bad required job(s) failed or were cancelled"
            exit 1
          fi
