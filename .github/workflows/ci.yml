name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "Files need gofmt:"
            echo "$out"
            exit 1
          fi

      - name: go vet (pure-Go modules)
        run: |
          for m in api ipc operator agent; do
            echo ">> go vet ./... in $m"
            (cd "$m" && go vet ./...)
          done

      - name: go build (pure-Go modules)
        run: |
          for m in api ipc operator agent; do
            echo ">> go build ./... in $m"
            (cd "$m" && go build ./...)
          done

      - name: go vet (cgo modules — gated)
        run: |
          # The gateway depends on libmxl + libmxl-fabrics (system
          # libraries from upstream dmf-mxl/mxl) and on
          # github.com/qvest-digital/go-mxl/fabrics, which has no
          # tagged release yet. Until both prerequisites are wired
          # into CI (libmxl install step + tagged go-mxl), the gateway
          # is verified locally only.
          for m in gateway; do
            echo "::warning::$m skipped: needs libmxl install step + tagged go-mxl"
          done

  manifests-check:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: Regenerate manifests
        run: make gen-api

      - name: Check no drift in generated files
        run: |
          if ! git diff --exit-code -- config/ api/v1alpha1/zz_generated.deepcopy.go; then
            echo "::error::generated files are out of date; run 'make gen-api' and commit the result"
            exit 1
          fi

  ipc-check:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: Regenerate proto
        run: make gen-ipc

      - name: Check no drift in generated proto files
        run: |
          if ! git diff --exit-code -- ipc/v1; then
            echo "::error::generated proto files are out of date; run 'make gen-ipc' and commit the result"
            exit 1
          fi
