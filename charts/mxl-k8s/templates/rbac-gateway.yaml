{{- if and .Values.gateway.enabled .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "mxlk8s.serviceAccountName" (dict "Context" . "component" "gateway" "values" .Values.gateway) }}
  labels:
    {{- include "mxlk8s.componentLabels" (dict "Context" . "component" "gateway") | nindent 4 }}
rules:
  - apiGroups: [mxl.qvest-digital.com]
    resources: [mxlflowmirrors, mxlnodecapabilities]
    verbs: [get, list, watch, create, update, patch]
  - apiGroups: [mxl.qvest-digital.com]
    resources: [mxlflowmirrors/status, mxlnodecapabilities/status]
    verbs: [get, update, patch]
  - apiGroups: [mxl.qvest-digital.com]
    resources: [mxlflowmirrors/finalizers]
    verbs: [update]
  - apiGroups: [mxl.qvest-digital.com]
    resources: [mxlflows]
    verbs: [get, list, watch]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "mxlk8s.serviceAccountName" (dict "Context" . "component" "gateway" "values" .Values.gateway) }}
  labels:
    {{- include "mxlk8s.componentLabels" (dict "Context" . "component" "gateway") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "mxlk8s.serviceAccountName" (dict "Context" . "component" "gateway" "values" .Values.gateway) }}
subjects:
  - kind: ServiceAccount
    name: {{ include "mxlk8s.serviceAccountName" (dict "Context" . "component" "gateway" "values" .Values.gateway) }}
    namespace: {{ include "mxlk8s.namespace" . }}
{{- end }}
