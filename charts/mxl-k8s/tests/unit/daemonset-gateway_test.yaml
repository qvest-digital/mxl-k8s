suite: daemonset-gateway
templates:
  - templates/daemonset-gateway.yaml
tests:
  - it: hostNetwork is true and dnsPolicy is ClusterFirstWithHostNet
    asserts:
      - equal:
          path: spec.template.spec.hostNetwork
          value: true
      - equal:
          path: spec.template.spec.dnsPolicy
          value: ClusterFirstWithHostNet

  - it: pod template name label matches the selector
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: mxl-k8s-gateway
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/name"]
          value: mxl-k8s-gateway

  - it: providers list joins on commas in the rendered arg
    set:
      gateway.flags.providers: [tcp, verbs, shm]
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --providers=tcp,verbs,shm

  - it: explicit empty string flag renders a bare --key= arg
    set:
      gateway.flags.bindAddress: ""
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --bind-address=

  - it: rdma.enabled adds IPC_LOCK + SYS_RESOURCE and the /dev/infiniband mount
    set:
      gateway.rdma.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.add
          content: IPC_LOCK
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.add
          content: SYS_RESOURCE
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: infiniband
            mountPath: /dev/infiniband
      - contains:
          path: spec.template.spec.volumes
          content:
            name: infiniband
            hostPath:
              path: /dev/infiniband
              type: Directory

  - it: rdma.enabled=false leaves the cap list and volumes alone
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].securityContext.capabilities.add
          content: IPC_LOCK
      - lengthEqual:
          path: spec.template.spec.volumes
          count: 1

  - it: POD_IP env wiring
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP

  - it: rdma.extraEnv is appended only when rdma.enabled
    set:
      gateway.rdma.enabled: true
      gateway.rdma.extraEnv:
        - name: FI_VERBS_IFACE
          value: net1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FI_VERBS_IFACE
            value: net1

  - it: rdma.extraEnv has no effect when rdma is disabled
    set:
      gateway.rdma.enabled: false
      gateway.rdma.extraEnv:
        - name: FI_VERBS_IFACE
          value: net1
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: FI_VERBS_IFACE
            value: net1

  - it: default rdma.resourceName emits no extended resource
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].resources.requests["rdma/hca_shared_devices"]
      - isNull:
          path: spec.template.spec.containers[0].resources.limits["rdma/hca_shared_devices"]

  - it: rdma.resourceName injects the extended resource on requests and limits
    set:
      gateway.rdma.resourceName: rdma/hca_shared_devices
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests["rdma/hca_shared_devices"]
          value: 1
      - equal:
          path: spec.template.spec.containers[0].resources.limits["rdma/hca_shared_devices"]
          value: 1

  - it: rdma.resourceName coexists with user-supplied resource entries
    set:
      gateway.rdma.resourceName: rdma/hca_shared_devices
      gateway.resources.requests.cpu: 250m
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 250m
      - equal:
          path: spec.template.spec.containers[0].resources.requests["rdma/hca_shared_devices"]
          value: 1
      - equal:
          path: spec.template.spec.containers[0].resources.limits["rdma/hca_shared_devices"]
          value: 1

  - it: full-rdma-nad fixture renders the NAD-attached pattern
    values:
      - ../values/full-rdma-nad.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --bind-address=
      - equal:
          path: spec.template.spec.containers[0].resources.requests["rdma/hca_shared_devices"]
          value: 1
      - equal:
          path: spec.template.spec.containers[0].resources.limits["rdma/hca_shared_devices"]
          value: 1
      - equal:
          path: spec.template.metadata.annotations["k8s.v1.cni.cncf.io/networks"]
          value: network/rdma-roce
      - equal:
          path: spec.template.spec.hostNetwork
          value: false
