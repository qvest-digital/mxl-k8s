suite: serviceaccount
templates:
  - templates/serviceaccount-operator.yaml
  - templates/serviceaccount-agent.yaml
  - templates/serviceaccount-gateway.yaml
  - templates/deployment-operator.yaml
tests:
  - it: serviceAccount.create=false skips the SA object but keeps the named reference
    set:
      operator.serviceAccount.create: false
      operator.serviceAccount.name: external-sa
    template: templates/serviceaccount-operator.yaml
    asserts:
      - hasDocuments:
          count: 0
  - it: deployment references the external SA in the same scenario
    set:
      operator.serviceAccount.create: false
      operator.serviceAccount.name: external-sa
    template: templates/deployment-operator.yaml
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: external-sa

  - it: IRSA-style annotations land on the SA
    set:
      operator.serviceAccount.annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::000:role/foo
    template: templates/serviceaccount-operator.yaml
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::000:role/foo
